<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Oxanium:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --hero-image-url: url('{{ hero_image_url }}'); }
  </style>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div>
        <p class="eyebrow">ARK: Survival Ascended</p>
        <h1>{{ app_title }}</h1>
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/players">Players</a>
        <a href="/tribes">Tribes</a>
        <a href="/leaderboards">Leaderboards</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="wrap hero-inner">
      <p class="badge">Dedicated Server</p>
      <h2>{{ server_name }}</h2>
      <p>Live Stat-Portal für Kills, Tames, Tribes und Leaderboards.</p>
    </div>
  </section>

  <main class="wrap main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
